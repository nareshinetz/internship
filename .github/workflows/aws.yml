name: Build and deploy to ECS

on:
  push:
    branches: [devops]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: inetz-internship
  ECS_CLUSTER: inetz-internship
  ECS_TASK_DEFINITION: inetz-internship
  ECS_SERVICE: inetz-internship

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
          NEXT_PUBLIC_RAZORPAY_KEY_ID: ${{ secrets.NEXT_PUBLIC_RAZORPAY_KEY_ID }}
        run: |
          if [ -n "${NEXT_PUBLIC_RAZORPAY_KEY_ID:-}" ]; then
            docker build \
              --build-arg NEXT_PUBLIC_RAZORPAY_KEY_ID="$NEXT_PUBLIC_RAZORPAY_KEY_ID" \
              -t "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" .
          else
            docker build -t "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" .
          fi
          docker tag "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" "$ECR_REGISTRY/$ECR_REPOSITORY:latest"
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:latest"
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: Render task definition with new image
        id: task-def
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
          CONTAINER_NAME: ${{ vars.CONTAINER_NAME }}
        run: |
          set -euo pipefail
          CN="${CONTAINER_NAME:-inetz-internship}"
          if [ "$CN" = "inetz-internships" ]; then CN="inetz-internship"; fi
          IMAGE_URI="${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"

          aws ecs describe-task-definition \
            --task-definition "${ECS_TASK_DEFINITION}" \
            --query taskDefinition \
            --output json > task-full.json

          MATCHES=$(jq --arg CN "$CN" '[.containerDefinitions[] | select(.name == $CN)] | length' task-full.json)
          if [ "$MATCHES" -lt 1 ]; then
            echo "::error::No container named '${CN}' in this task definition. Set repo variable CONTAINER_NAME to match ECS (see task definition JSON)."
            echo "::notice::Container names in task definition:"
            jq -r '.containerDefinitions[].name' task-full.json
            exit 1
          fi

          jq --arg IMG "$IMAGE_URI" --arg CN "$CN" '
            del(
              .taskDefinitionArn,
              .revision,
              .status,
              .requiresAttributes,
              .compatibilities,
              .registeredAt,
              .registeredBy,
              .deregisteredAt,
              .tags
            )
            | .containerDefinitions |= map(
                if .name == $CN then .image = $IMG else . end
              )
          ' task-full.json > task-new.json

          ARN=$(aws ecs register-task-definition \
            --cli-input-json file://task-new.json \
            --query taskDefinition.taskDefinitionArn \
            --output text)
          echo "arn=$ARN" >> "$GITHUB_OUTPUT"

      - name: Update ECS service
        run: |
          aws ecs update-service \
            --cluster "${ECS_CLUSTER}" \
            --service "${ECS_SERVICE}" \
            --task-definition "${{ steps.task-def.outputs.arn }}" \
            --force-new-deployment

      - name: Wait for service stability
        run: |
          aws ecs wait services-stable \
            --cluster "${ECS_CLUSTER}" \
            --services "${ECS_SERVICE}"
